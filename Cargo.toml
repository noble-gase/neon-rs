[package]
name = "ne"
version = "0.8.0"
edition = { workspace = true }
authors = ["ShengHui <847713844@qq.com>"]
keywords = ["crypto", "hash", "redis", "redlock", "sql"]
description = "The Rust Development Toolkit"
license = "MIT"
repository = "https://github.com/noble-gase/kr"

[workspace]
members = ["crates/*"]

[workspace.package]
edition = "2024"

[workspace.dependencies]
syn = "2"
quote = "1"
proc-macro2 = "1"
tokio = "1"
anyhow = "1.0"
tracing = "0.1"
const-hex = "1.13"
aes = "0.8"
aes-gcm = "0.10"
cbc = "0.1"
ecb = "0.1"
des = "0.8"
block-padding = "0.3"
cipher = "0.4"
rsa = "0.9"
pkcs1 = "0.7"
pkcs8 = "0.10"
spki = "0.7"
x509-cert = "0.2"
p12 = "0.6"
digest = "0.10"
md-5 = "0.10"
sha1 = "0.10"
sha2 = "0.10"
hmac = "0.12"
base64 = "0.22"
pem = "3"
url = "2"
form_urlencoded = "1"
percent-encoding = "2"
rand = "0.10"
jiff = "0.2"
time = "0.3"
serde = "1.0"
serde_json = "1.0"
uuid = "1.15"
sqlx = "0.8"
redis = "0.32"
r2d2 = "0.8"
bb8 = "0.9"
sea-query = "0.32"
sea-query-binder = "0.7"

[dependencies]
kr-core = { path = "crates/kr-core", version = "0.1.0", default-features = false }
kr-crypto = { path = "crates/kr-crypto", version = "0.1.0", optional = true, default-features = false }
kr-macros = { path = "crates/kr-macros", version = "0.1.0", optional = true, default-features = false }
kr-redis = { path = "crates/kr-redis", version = "0.1.0", optional = true, default-features = false }
kr-sql = { path = "crates/kr-sql", version = "0.1.0", optional = true, default-features = false }

[features]
default = []
crypto = ["dep:kr-crypto"]
macros = ["dep:kr-macros"]
redis = ["dep:kr-redis"]
sql = ["dep:kr-sql"]
